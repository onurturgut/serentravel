<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seren Travel çevrimdışı</title>
    <meta name="theme-color" content="#071a3d" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8f5;
        color: #071a3d;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        padding: 24px;
      }
      main {
        max-width: 480px;
        border: 1px solid #dde2e8;
        border-radius: 12px;
        background: white;
        padding: 28px;
        box-shadow: 0 18px 45px rgb(7 26 61 / 0.12);
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      p {
        color: rgb(7 26 61 / 0.7);
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 999px;
        background: #d7b13f;
        color: #071a3d;
        padding: 0 18px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Şu an çevrimdışısınız.</h1>
      <p>
        İnternet bağlantısı gelince Seren Travel sayfalarını tekrar
        görüntüleyebilirsiniz.
      </p>
      <a href="/">Ana sayfaya dön</a>
    </main>
  </body>
</html>
